# =============================================================================
# Release automático — CobroFacil POS (TPV Pro 2026)
# Repositorio: https://github.com/cesarmaciel1234/cobrofacil-releases
# Descarga permanente: https://github.com/cesarmaciel1234/cobrofacil-releases/releases/latest
# Se dispara en cada push a main (o manualmente desde Actions).
# =============================================================================

name: Build y Release Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:   # Permite lanzar el build desde GitHub → Actions → Run workflow

permissions:
  contents: write   # Necesario para crear Releases y subir assets

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Clonar el repositorio
      # -----------------------------------------------------------------------
      - name: Clonar repositorio
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Configurar Python
      # -----------------------------------------------------------------------
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # -----------------------------------------------------------------------
      # 3. Instalar dependencias del proyecto + PyInstaller
      # -----------------------------------------------------------------------
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Incrementar version de release
        id: version
        shell: pwsh
        run: |
          $path = "version.json"
          $data = Get-Content $path -Raw | ConvertFrom-Json
          $current = [double]$data.app_version
          $data.app_version = [string]($current + 1)
          $data.build_date = (Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          $data | ConvertTo-Json -Depth 20 | Set-Content $path -Encoding utf8
          echo "tag=v$($data.app_version)" >> $env:GITHUB_OUTPUT
          echo "app_version=$($data.app_version)" >> $env:GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      # 4. Compilar main.py → dist/CobroFacil_POS/CobroFacil_POS.exe
      #    (--onedir: carpeta con el .exe y librerías; mismo criterio que Compilar_Todo.bat)
      # -----------------------------------------------------------------------
      - name: Compilar ejecutable con PyInstaller
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "CobroFacil_POS" `
            --hidden-import "reportlab.graphics.barcode.code93" `
            --hidden-import "reportlab.graphics.barcode.code128" `
            --hidden-import "reportlab.graphics.barcode.code39" `
            --hidden-import "reportlab.graphics.barcode.eanbc" `
            --hidden-import "lxml" `
            --hidden-import "html5lib" `
            --hidden-import "openpyxl" `
            --hidden-import "win32com" `
            --hidden-import "win32com.client" `
            --collect-submodules "src.admin" `
            --collect-submodules "src.jefe" `
            --collect-submodules "src.carteleria" `
            --collect-submodules "src.services" `
            --add-data "src/styles.qss;src/" `
            --add-data "src/styles_light.qss;src/" `
            main.py

      - name: Copiar version.json al paquete instalable
        run: Copy-Item version.json dist/CobroFacil_POS/version.json

      # -----------------------------------------------------------------------
      # 4b. MariaDB portable + ZIP del release (POS + mariadb_server)
      # -----------------------------------------------------------------------
      - name: Preparar MariaDB portable
        run: python 01_Compiladores_y_Ejecutables/prepare_mariadb_release.py

      - name: Configurar reporte automático de errores
        shell: pwsh
        env:
          REPORT_TOKEN: ${{ secrets.COBROFACIL_ERROR_REPORT_TOKEN }}
        run: |
          $cfg = @{
            token = $env:REPORT_TOKEN
            repo  = "cesarmaciel1234/cobrofacil-releases"
          } | ConvertTo-Json -Compress
          Set-Content -Path "dist/CobroFacil_POS/error_report.json" -Value $cfg -Encoding utf8

      - name: Empaquetar release (.zip)
        run: python 01_Compiladores_y_Ejecutables/package_release_zip.py

      # -----------------------------------------------------------------------
      # 5. Crear Release en GitHub (tag por versión; /releases/latest apunta al más nuevo)
      # -----------------------------------------------------------------------
      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: CobroFacil POS ${{ steps.version.outputs.app_version }}
          body: |
            Build automático — [cobrofacil-releases](https://github.com/cesarmaciel1234/cobrofacil-releases)
            - Versión: ${{ steps.version.outputs.app_version }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.run_id }}
            - Descargar **CobroFacil_POS_Release.zip**, descomprimir y ejecutar `CobroFacil_POS.exe`.
            - Enlace: https://github.com/cesarmaciel1234/cobrofacil-releases/releases/latest
          files: dist/CobroFacil_POS_Release.zip
          fail_on_unmatched_files: true
          make_latest: true
          draft: false
          prerelease: false

      - name: Verificar que el ZIP quedó publicado
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          COUNT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets | length')
          if [ "$COUNT" -lt 1 ]; then
            echo "ERROR: el release $TAG no tiene assets adjuntos"
            exit 1
          fi
          gh release view "$TAG" --repo "${{ github.repository }}" --json assets -q '.assets[].name'
